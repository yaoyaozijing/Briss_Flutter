name: Build All Platforms

on:
  workflow_dispatch:
    inputs:
      build_platform:
        description: Platform to build
        required: false
        default: all
        type: choice
        options:
          - all
          - android
          - linux
          - windows
          - macos
          - ios
      publish_release:
        description: Publish a GitHub Release after this manual run
        required: false
        default: false
        type: boolean
      release_tag:
        description: Optional release tag for manual publish, for example v0.2.1-beta.1
        required: false
        type: string
  push:
    tags:
      - 'v*'

concurrency:
  group: build-all-platforms-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_SLUG: procropper-pdf

jobs:
  android:
    name: Android
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_platform == 'all' || github.event.inputs.build_platform == 'android'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve Build Metadata
        shell: bash
        run: |
          VERSION="$(grep '^version:' pubspec.yaml | head -n1 | awk '{print $2}')"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            BUILD_SUFFIX="v${VERSION}"
          else
            BUILD_SUFFIX="v${VERSION}-${SHORT_SHA}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "BUILD_SUFFIX=${BUILD_SUFFIX}" >> "$GITHUB_ENV"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build Android APKs
        run: flutter build apk --release --split-per-abi

      - name: Rename Android APKs
        shell: bash
        run: |
          cd build/app/outputs/flutter-apk
          mv app-armeabi-v7a-release.apk "${APP_SLUG}-${BUILD_SUFFIX}-android-armeabi-v7a.apk"
          mv app-arm64-v8a-release.apk "${APP_SLUG}-${BUILD_SUFFIX}-android-arm64-v8a.apk"
          mv app-x86_64-release.apk "${APP_SLUG}-${BUILD_SUFFIX}-android-x86_64.apk"

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-artifacts
          path: |
            build/app/outputs/flutter-apk/${{ env.APP_SLUG }}-*.apk
          if-no-files-found: error

  linux:
    name: Linux
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_platform == 'all' || github.event.inputs.build_platform == 'linux'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve Build Metadata
        shell: bash
        run: |
          VERSION="$(grep '^version:' pubspec.yaml | head -n1 | awk '{print $2}')"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            BUILD_SUFFIX="v${VERSION}"
          else
            BUILD_SUFFIX="v${VERSION}-${SHORT_SHA}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "BUILD_SUFFIX=${BUILD_SUFFIX}" >> "$GITHUB_ENV"

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            desktop-file-utils \
            clang \
            cmake \
            libarchive-tools \
            libblkid-dev \
            libgtk-3-dev \
            liblzma-dev \
            ninja-build \
            pkg-config \
            zstd

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Linux Desktop
        run: flutter config --enable-linux-desktop

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build Linux Bundle
        run: flutter build linux --release

      - name: Package Linux Bundle
        run: |
          cd build/linux/x64/release
          tar -czf "${APP_SLUG}-${BUILD_SUFFIX}-linux-x64.tar.gz" bundle

      - name: Build Arch Linux Package
        shell: bash
        run: |
          VERSION_PKG="${VERSION//-/_}"
          PKG_ROOT="build/linux/x64/release/arch-pkg"
          INSTALL_ROOT="$PKG_ROOT/usr"
          APP_DIR="$INSTALL_ROOT/lib/procropper-pdf"
          BIN_DIR="$INSTALL_ROOT/bin"
          DESKTOP_DIR="$INSTALL_ROOT/share/applications"
          ICON_DIR="$INSTALL_ROOT/share/icons/hicolor/1024x1024/apps"

          rm -rf "$PKG_ROOT"
          mkdir -p "$APP_DIR" "$BIN_DIR" "$DESKTOP_DIR" "$ICON_DIR"

          cp -R build/linux/x64/release/bundle/. "$APP_DIR/"
          ln -s "/usr/lib/procropper-pdf/procropper_pdf" "$BIN_DIR/procropper-pdf"
          cp assets/branding/app_icon/app_icon_1024.png "$ICON_DIR/procropper-pdf.png"

          cat > "$DESKTOP_DIR/procropper-pdf.desktop" <<'EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=ProCropper PDF
          Comment=Smart PDF crop tool
          Exec=/usr/bin/procropper-pdf %F
          Icon=procropper-pdf
          Terminal=false
          Categories=Office;Graphics;Utility;
          MimeType=application/pdf;
          StartupNotify=true
          EOF

          INSTALLED_SIZE="$(du -sk "$PKG_ROOT" | cut -f1)"
          cat > "$PKG_ROOT/.PKGINFO" <<EOF
          pkgname=procropper-pdf
          pkgbase=procropper-pdf
          pkgver=$VERSION_PKG
          pkgrel=1
          pkgdesc=Smart PDF crop tool built with Flutter
          url=https://github.com/${GITHUB_REPOSITORY}
          builddate=$(date +%s)
          packager=GitHub Actions
          size=$INSTALLED_SIZE
          arch=x86_64
          license=custom
          depend=gtk3
          depend=glibc
          depend=gcc-libs
          depend=hicolor-icon-theme
          depend=desktop-file-utils
          EOF

          bsdtar \
            --format=mtree \
            --options='!all,use-set,type,uid,gid,mode,time,size,md5,sha256,link' \
            -cf "$PKG_ROOT/.MTREE" \
            -C "$PKG_ROOT" \
            .PKGINFO usr

          cat > "$PKG_ROOT/.BUILDINFO" <<EOF
          format = 2
          pkgname = procropper-pdf
          pkgbase = procropper-pdf
          pkgver = $VERSION_PKG-1
          pkgarch = x86_64
          pkgbuild_sha256sum = SKIP
          packager = GitHub Actions
          builddate = $(date +%s)
          builddir = /github/workspace
          startdir = /github/workspace
          buildtool = github-actions
          buildtoolver = 1
          EOF

          cd "$PKG_ROOT"
          bsdtar --zstd -cf "../${APP_SLUG}-${BUILD_SUFFIX}-linux-x86_64.pkg.tar.zst" .PKGINFO .MTREE .BUILDINFO usr

      - name: Build AppImage
        shell: bash
        run: |
          APPDIR="build/linux/x64/release/AppDir"
          APP_NAME="ProCropper PDF"
          APP_EXEC="procropper_pdf"
          APPDESKTOP="$APPDIR/procropper-pdf.desktop"

          rm -rf "$APPDIR"
          mkdir -p \
            "$APPDIR/usr/bin" \
            "$APPDIR/usr/lib/procropper-pdf" \
            "$APPDIR/usr/share/applications" \
            "$APPDIR/usr/share/icons/hicolor/1024x1024/apps"

          cp -R build/linux/x64/release/bundle/. "$APPDIR/usr/lib/procropper-pdf/"
          ln -s ../lib/procropper-pdf/procropper_pdf "$APPDIR/usr/bin/procropper-pdf"
          cp assets/branding/app_icon/app_icon_1024.png \
            "$APPDIR/usr/share/icons/hicolor/1024x1024/apps/procropper-pdf.png"

          cat > "$APPDIR/usr/share/applications/procropper-pdf.desktop" <<'EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=ProCropper PDF
          Comment=Smart PDF crop tool
          Exec=procropper-pdf %F
          Icon=procropper-pdf
          Terminal=false
          Categories=Office;Graphics;Utility;
          MimeType=application/pdf;
          StartupNotify=true
          EOF

          cp "$APPDIR/usr/share/applications/procropper-pdf.desktop" "$APPDESKTOP"
          cp "$APPDIR/usr/share/icons/hicolor/1024x1024/apps/procropper-pdf.png" "$APPDIR/procropper-pdf.png"

          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="$HERE/usr/lib/procropper-pdf/lib:$HERE/usr/lib/procropper-pdf:$LD_LIBRARY_PATH"
          exec "$HERE/usr/bin/procropper-pdf" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          curl -L \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -o build/linux/x64/release/appimagetool.AppImage
          chmod +x build/linux/x64/release/appimagetool.AppImage

          ARCH=x86_64 build/linux/x64/release/appimagetool.AppImage --appimage-extract-and-run \
            "$APPDIR" \
            "build/linux/x64/release/${APP_SLUG}-${BUILD_SUFFIX}-linux-x86_64.AppImage"

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-artifacts
          path: |
            build/linux/x64/release/${{ env.APP_SLUG }}-*.tar.gz
            build/linux/x64/release/${{ env.APP_SLUG }}-*.pkg.tar.zst
            build/linux/x64/release/${{ env.APP_SLUG }}-*.AppImage
          if-no-files-found: error

  windows:
    name: Windows
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_platform == 'all' || github.event.inputs.build_platform == 'windows'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve Build Metadata
        shell: powershell
        run: |
          $VERSION = (Select-String -Path pubspec.yaml -Pattern '^version:' | Select-Object -First 1 | ForEach-Object { ($_ -split '\s+')[1] }).Trim()
          $SHORT_SHA = (git rev-parse --short HEAD).Trim()
          if ("${env:GITHUB_REF}" -like "refs/tags/v*") {
            $BUILD_SUFFIX = "v$VERSION"
          } else {
            $BUILD_SUFFIX = "v$VERSION-$SHORT_SHA"
          }
          "VERSION=$VERSION" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SHORT_SHA=$SHORT_SHA" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "BUILD_SUFFIX=$BUILD_SUFFIX" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build Windows App
        run: flutter build windows --release

      - name: Create MSIX
        run: dart run msix:create

      - name: Rename MSIX
        shell: powershell
        run: |
          $msix = Get-ChildItem -Path build/windows -Filter *.msix -Recurse | Select-Object -First 1
          if (-not $msix) {
            throw "MSIX file not found."
          }
          $target = Join-Path $msix.DirectoryName "${env:APP_SLUG}-${env:BUILD_SUFFIX}-windows-x64.msix"
          Move-Item -LiteralPath $msix.FullName -Destination $target -Force

      - name: Package Windows Bundle
        shell: powershell
        run: |
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath build/windows/x64/runner/${env:APP_SLUG}-${env:BUILD_SUFFIX}-windows-x64.zip `
            -Force

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-artifacts
          path: |
            build/windows/x64/runner/${{ env.APP_SLUG }}-*.zip
            build/windows/**/*.msix
          if-no-files-found: error

  macos:
    name: macOS
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_platform == 'all' || github.event.inputs.build_platform == 'macos'
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve Build Metadata
        shell: bash
        run: |
          VERSION="$(grep '^version:' pubspec.yaml | head -n1 | awk '{print $2}')"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            BUILD_SUFFIX="v${VERSION}"
          else
            BUILD_SUFFIX="v${VERSION}-${SHORT_SHA}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "BUILD_SUFFIX=${BUILD_SUFFIX}" >> "$GITHUB_ENV"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable macOS Desktop
        run: flutter config --enable-macos-desktop

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build macOS App
        run: flutter build macos --release

      - name: Resolve macOS App Bundle Name
        shell: bash
        run: |
          APP_BUNDLE_PATH="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' -print -quit)"
          if [[ -z "$APP_BUNDLE_PATH" ]]; then
            echo "No .app bundle found in build/macos/Build/Products/Release"
            exit 1
          fi
          APP_BUNDLE_NAME="$(basename "$APP_BUNDLE_PATH")"
          echo "APP_BUNDLE_PATH=$APP_BUNDLE_PATH" >> "$GITHUB_ENV"
          echo "APP_BUNDLE_NAME=$APP_BUNDLE_NAME" >> "$GITHUB_ENV"

      - name: Package macOS ZIP
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent "${APP_BUNDLE_NAME}" "${APP_SLUG}-${BUILD_SUFFIX}-macos.zip"

      - name: Package macOS DMG
        run: |
          cd build/macos/Build/Products/Release
          mkdir -p dmg-root
          cp -R "${APP_BUNDLE_NAME}" "dmg-root/${APP_BUNDLE_NAME}"
          hdiutil create \
            -volname "ProCropper PDF" \
            -srcfolder dmg-root \
            -ov \
            -format UDZO \
            "${APP_SLUG}-${BUILD_SUFFIX}-macos.dmg"

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-artifacts
          path: |
            build/macos/Build/Products/Release/${{ env.APP_SLUG }}-*.zip
            build/macos/Build/Products/Release/${{ env.APP_SLUG }}-*.dmg
          if-no-files-found: error

  ios:
    name: iOS
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_platform == 'all' || github.event.inputs.build_platform == 'ios'
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve Build Metadata
        shell: bash
        run: |
          VERSION="$(grep '^version:' pubspec.yaml | head -n1 | awk '{print $2}')"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            BUILD_SUFFIX="v${VERSION}"
          else
            BUILD_SUFFIX="v${VERSION}-${SHORT_SHA}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "BUILD_SUFFIX=${BUILD_SUFFIX}" >> "$GITHUB_ENV"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build iOS App Without Codesign
        run: flutter build ios --release --no-codesign

      - name: Package Unsigned IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa
          zip -r "${APP_SLUG}-${BUILD_SUFFIX}-ios-unsigned.ipa" Payload

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-artifacts
          path: build/ios/ipa/${{ env.APP_SLUG }}-*.ipa
          if-no-files-found: error

  release:
    name: Publish Release Assets
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true' && github.event.inputs.build_platform == 'all')
    needs:
      - android
      - linux
      - windows
      - macos
      - ios
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve Release Metadata
        shell: bash
        run: |
          VERSION="$(grep '^version:' pubspec.yaml | head -n1 | awk '{print $2}')"
          SHORT_SHA="${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            RELEASE_TAG="${GITHUB_REF#refs/tags/}"
            PRERELEASE="false"
          else
            INPUT_TAG="${{ github.event.inputs.release_tag }}"
            if [[ -n "$INPUT_TAG" ]]; then
              RELEASE_TAG="$INPUT_TAG"
            else
              RELEASE_TAG="v${VERSION}-manual-${SHORT_SHA}"
            fi
            PRERELEASE="true"
          fi
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "PRERELEASE=${PRERELEASE}" >> "$GITHUB_ENV"

      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          prerelease: ${{ env.PRERELEASE }}
          target_commitish: ${{ github.sha }}
          files: |
            release-artifacts/**/*.apk
            release-artifacts/**/*.ipa
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.pkg.tar.zst
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.zip
            release-artifacts/**/*.dmg
            release-artifacts/**/*.msix
          generate_release_notes: true
